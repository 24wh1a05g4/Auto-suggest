<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar {
            position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar {
            position: fixed;
            top: 20px;
            right: 20px;
       

        }
        .search-section {
            text-align: center;
            margin-top: 100px;
        }
        .logo-first{
            color: #ff5733;
        }
        .tag-line {
            color: #555555;
        }
        .lens{
            position: relative;
            left: 30px;

        }
        .search-box{
            padding: 15px 15px 15px 45px;
            border-radius: 25px;
            width: 50%; 
          
        }
        #suggestion-box{
            /*border:1px solid black;*/
            width: 40%;
            padding: 15px 15px 15px 45px;
            margin:0 auto;
            margin-left: 30%;
            
        }
        #suggestion-item{
            border: 1px solid #cccccc;
            padding: 10px;
            border-radius: 5px;
            
        }
    </style>
</head>
<body>
    <div>
    <span class="left-bar">&#9881;</span> 
    <span class="right-bar">&#x2022; online | &#x1F552; -ms</span>
    </div>

    <div class="search-section">
    <h1><span class="logo-first">Being</span><span>Infinity</span></h1>
    <p class="tag-line">One million phrases,Four algorithms,Prefix Based Auto Suggest.</p>
    <span>
       <span class="lens">&#128269;</span>
 
      <input class="search-box" id="search-box" placeholder="Start typing to search phrases..." >

</span>
<div id="suggestion-box">
    <!-- Suggestions will appear here -->
</div>
</div>
<script>
    var searchBox = document.getElementById("search-box");
    var suggestionBox = document.getElementById("suggestion-box");
    searchBox.addEventListener("input", function() {
      
        var USER_INPUT = searchBox.value;
        if(USER_INPUT.trim() === ""){
            suggestionBox.innerHTML = "";
            return;
        }else{
            var url = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
            var url1 = "&algorithm=brute&limit=10&weighted=false";
            var fullUrl = url + USER_INPUT + url1;
            fetch(fullUrl)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                console.log(data);

                var results = data.results;
                var htmlresults = "";
                for (var i = 0; i < results.length; i++)
                 {
                    htmlresults += "<div id='suggestion-item'>" + results[i].text + "</div>";
                }
                //var suggestionBox = document.getElementById("suggestion-box");
                suggestionBox.innerHTML = htmlresults;
        })
    }
});
       

</script>

</body>
</html>
